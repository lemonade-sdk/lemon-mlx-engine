name: Build MLX Engine
on:
  workflow_dispatch:
    inputs:
      operating_systems:
        description: 'Operating systems to build for (comma-separated: ubuntu,macos)'
        required: false
        default: 'ubuntu,macos'
      create_release:
        description: 'Create a GitHub release after successful build'
        required: false
        default: true
        type: boolean

  pull_request:
    types: [opened, synchronize, reopened]

  schedule:
    - cron: '0 14 * * *'

env:
  OPERATING_SYSTEMS: ${{ github.event.inputs.operating_systems || 'ubuntu,macos' }}

jobs:
  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      should_build_ubuntu_rocm: ${{ steps.set-matrix.outputs.should_build_ubuntu_rocm }}
      should_build_ubuntu_cpu: ${{ steps.set-matrix.outputs.should_build_ubuntu_cpu }}
      should_build_macos: ${{ steps.set-matrix.outputs.should_build_macos }}
    steps:
    - name: Set matrix
      id: set-matrix
      run: |
        operating_systems="${{ env.OPERATING_SYSTEMS }}"
        echo "Input operating systems: $operating_systems"

        should_build_ubuntu_rocm="false"
        should_build_ubuntu_cpu="false"
        should_build_macos="false"

        if [[ "$operating_systems" == *"ubuntu"* ]]; then
          should_build_ubuntu_rocm="true"
          should_build_ubuntu_cpu="true"
        fi

        if [[ "$operating_systems" == *"macos"* ]]; then
          should_build_macos="true"
        fi

        echo "should_build_ubuntu_rocm=$should_build_ubuntu_rocm" >> $GITHUB_OUTPUT
        echo "should_build_ubuntu_cpu=$should_build_ubuntu_cpu" >> $GITHUB_OUTPUT
        echo "should_build_macos=$should_build_macos" >> $GITHUB_OUTPUT

        echo "Ubuntu ROCm build: $should_build_ubuntu_rocm"
        echo "Ubuntu CPU build: $should_build_ubuntu_cpu"
        echo "macOS build: $should_build_macos"

  build-ubuntu-rocm:
    name: build-ubuntu-rocm (${{ matrix.channel }})
    runs-on: ubuntu-22.04
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_ubuntu_rocm == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: stable
            rocm_version: "7.2.2"
            rocm_source: sdk-bundle
            release_repo: lemonade-sdk/rocm-stable
            gpu_targets: "gfx908;gfx90a;gfx942;gfx1100;gfx1101;gfx1102;gfx1150;gfx1151;gfx1200;gfx1201"
          - channel: preview
            rocm_version: "7.12.0"
            rocm_source: amd-tarball
            gpu_targets: "gfx908;gfx90a;gfx942;gfx950;gfx1100;gfx1101;gfx1102;gfx1150;gfx1151;gfx1200;gfx1201"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build patchelf unzip curl \
          libcurl4-openssl-dev libopenblas-dev liblapacke-dev pkg-config

    - name: Install ROCm
      run: |
        if [ "${{ matrix.rocm_source }}" = "sdk-bundle" ]; then
          # Full SDK bundle from lemonade-sdk/rocm-stable.
          # Split into 3 SDK artifacts (each <2 GiB for GitHub release asset limit)
          # plus a separate runtime-libs tarball for end users.
          # MLX Engine build needs all 3 SDK artifacts extracted to /opt/rocm.
          sudo mkdir -p /opt/rocm

          # --- Download all 3 SDK artifacts in a loop ---
          for part in toolchain blas math; do
            url="https://github.com/${{ matrix.release_repo }}/releases/download/v${{ matrix.rocm_version }}/rocm-${{ matrix.rocm_version }}-sdk-${part}.tar.gz"
            sha256_url="${url}.sha256"
            echo "Downloading SDK ${part} from $url"
            curl -fsSL "$url" -o /tmp/rocm-sdk-${part}.tar.gz
            curl -fsSL "$sha256_url" -o /tmp/rocm-sdk-${part}.tar.gz.sha256
            (cd /tmp && sha256sum -c rocm-sdk-${part}.tar.gz.sha256)
            echo "Extracting SDK ${part} to /opt/rocm ..."
            sudo tar -xzf /tmp/rocm-sdk-${part}.tar.gz -C /opt/rocm --strip-components=1
          done

          # --- Cleanup ---
          rm -f /tmp/rocm-sdk-toolchain.tar.gz /tmp/rocm-sdk-toolchain.tar.gz.sha256
          rm -f /tmp/rocm-sdk-blas.tar.gz /tmp/rocm-sdk-blas.tar.gz.sha256
          rm -f /tmp/rocm-sdk-math.tar.gz /tmp/rocm-sdk-math.tar.gz.sha256

          # --- Symlinks if needed ---
          if [ -f /opt/rocm/bin/amdclang ] && [ ! -f /opt/rocm/bin/clang ]; then
            sudo ln -sf /opt/rocm/bin/amdclang /opt/rocm/bin/clang
            sudo ln -sf /opt/rocm/bin/amdclang++ /opt/rocm/bin/clang++
          fi
          if [ -f /opt/rocm/lib/llvm/bin/amdclang ] && [ ! -f /opt/rocm/lib/llvm/bin/clang ]; then
            sudo ln -sf /opt/rocm/lib/llvm/bin/amdclang /opt/rocm/lib/llvm/bin/clang
            sudo ln -sf /opt/rocm/lib/llvm/bin/amdclang++ /opt/rocm/lib/llvm/bin/clang++
          fi

          # --- Smoke test: verify all SDK artifacts installed correctly ---
          # sdk-toolchain: compiler, headers, cmake configs
          for check in \
            "/opt/rocm/bin/amdclang" \
            "/opt/rocm/bin/hipcc" \
            "/opt/rocm/include/hip/hip_runtime.h" \
            "/opt/rocm/lib/cmake/hip" \
            "/opt/rocm/lib/cmake/amdclang"; do
            if [ ! -e "$check" ]; then echo "::error::sdk-toolchain component missing: $check"; exit 1; fi
          done

          # sdk-blas: rocBLAS, hipBLAS, Tensile kernels
          for check in \
            "/opt/rocm/lib/librocblas.so" \
            "/opt/rocm/lib/libhipblas.so" \
            "/opt/rocm/lib/cmake/rocblas"; do
            if [ ! -e "$check" ]; then echo "::error::sdk-blas component missing: $check"; exit 1; fi
          done

          # sdk-math: rocSPARSE, rocSOLVER, rocWMMA
          for check in \
            "/opt/rocm/lib/librocsparse.so" \
            "/opt/rocm/lib/librocsolver.so" \
            "/opt/rocm/lib/cmake/rocsparse" \
            "/opt/rocm/lib/cmake/rocwmma"; do
            if [ ! -e "$check" ]; then echo "::error::sdk-math component missing: $check"; exit 1; fi
          done

          echo "ROCm SDK (3 artifacts) verified successfully."
          ls -lh /opt/rocm/lib/libroc*.so /opt/rocm/lib/libhipblas.so 2>/dev/null || true
        else
          sudo mkdir -p /opt/rocm
          url="https://repo.amd.com/rocm/tarball/therock-dist-linux-gfx1151-${{ matrix.rocm_version }}.tar.gz"
          echo "Installing ROCm ${{ matrix.rocm_version }} from $url"
          curl -fsSL "$url" | sudo tar -xzf - -C /opt/rocm --strip-components=1
        fi

    - name: Set ROCm environment variables
      run: |
        echo "HIP_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "ROCM_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "HIP_PLATFORM=amd" >> $GITHUB_ENV
        echo "/opt/rocm/bin:/opt/rocm/llvm/bin:/opt/rocm/lib/llvm/bin:$PATH" >> $GITHUB_PATH

    - name: Locate ROCm clang
      id: rocm-paths
      run: |
        set -euo pipefail
        find_in_rocm() {
          find /opt/rocm/ \( -type f -o -type l \) -name "$1" \
            \( -path '*/bin/*' -o -path '*/llvm/bin/*' \) 2>/dev/null | head -n 1
        }
        CLANG_PATH=$(find_in_rocm amdclang)
        [ -n "$CLANG_PATH" ] || CLANG_PATH=$(find_in_rocm clang)
        if [ -z "$CLANG_PATH" ]; then
          echo "::error::No amdclang/clang found under /opt/rocm/"
          find /opt/rocm/ -maxdepth 6 -type d -name bin 2>/dev/null
          exit 1
        fi
        CLANG_DIR=$(dirname "$CLANG_PATH")
        case "$(basename "$CLANG_PATH")" in
          amdclang) CLANGXX_PATH="$CLANG_DIR/amdclang++" ;;
          clang)    CLANGXX_PATH="$CLANG_DIR/clang++" ;;
        esac
        echo "clang:   $CLANG_PATH"
        echo "clang++: $CLANGXX_PATH"
        echo "clang=$CLANG_PATH" >> $GITHUB_OUTPUT
        echo "clangxx=$CLANGXX_PATH" >> $GITHUB_OUTPUT

    - name: Cache FetchContent MLX source
      uses: actions/cache@v4
      with:
        path: |
          build/_deps/mlx-src
          build/_deps/mlx-subbuild
        key: mlx-src-linux-${{ hashFiles('CMakeLists.txt') }}

    - name: Build MLX Engine + ROCm
      run: |
        export HIP_PATH=/opt/rocm
        export ROCM_PATH=/opt/rocm
        export PATH="/opt/rocm/bin:/opt/rocm/llvm/bin:/opt/rocm/lib/llvm/bin:$PATH"

        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER="${{ steps.rocm-paths.outputs.clang }}" \
          -DCMAKE_CXX_COMPILER="${{ steps.rocm-paths.outputs.clangxx }}" \
          -DCMAKE_PREFIX_PATH=/opt/rocm \
          -DCMAKE_HIP_ARCHITECTURES="${{ matrix.gpu_targets }}" \
          -DCMAKE_CXX_CLANG_TIDY= \
          -DCLANG_TIDY_EXE=CLANG_TIDY_EXE-NOTFOUND \
          -DMINJA_EXAMPLE_ENABLED=OFF \
          -DMLX_BUILD_ROCM=ON \
          -DMLX_LM_BUILD_TESTS=OFF \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(nproc)

    - name: Package build artifacts
      run: |
        mkdir -p output

        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        for lib in libopenblas.so* liblapacke.so* libgfortran.so*; do
          cp /usr/lib/x86_64-linux-gnu/$lib output/ 2>/dev/null || true
        done

        for binary in output/server output/chat output/diagnose; do
          if [ -f "$binary" ]; then
            patchelf --set-rpath '$ORIGIN:/opt/rocm/lib' "$binary" 2>/dev/null || true
          fi
        done

        echo "Packaged artifacts (no ROCm libs bundled — requires system ROCm):"
        ls -lh output/

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-ubuntu-rocm-${{ matrix.channel }}-x64
        path: output/
        retention-days: 30

  build-ubuntu-cpu:
    runs-on: ubuntu-22.04
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_ubuntu_cpu == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build \
          libcurl4-openssl-dev libopenblas-dev liblapacke-dev pkg-config

    - name: Cache FetchContent MLX source
      uses: actions/cache@v4
      with:
        path: |
          build/_deps/mlx-src
          build/_deps/mlx-subbuild
        key: mlx-src-linux-${{ hashFiles('CMakeLists.txt') }}

    - name: Build MLX Engine (CPU only)
      run: |
        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_CLANG_TIDY= \
          -DCLANG_TIDY_EXE=CLANG_TIDY_EXE-NOTFOUND \
          -DMINJA_EXAMPLE_ENABLED=OFF \
          -DMLX_BUILD_ROCM=OFF \
          -DMLX_LM_BUILD_TESTS=ON \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(nproc)

    - name: Run unit tests (CPU-safe only)
      run: |
        cd build
        ctest --test-dir tests -R "test_types|test_config|test_generate|test_kv_cache|test_chat_template|test_rope_utils" \
          --output-on-failure --timeout 120

    - name: Package build artifacts
      run: |
        mkdir -p output
        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        for lib in libopenblas.so* liblapacke.so* libgfortran.so*; do
          cp /usr/lib/x86_64-linux-gnu/$lib output/ 2>/dev/null || true
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-ubuntu-cpu-x64
        path: output/
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_macos == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        brew install cmake ninja curl

    - name: Cache FetchContent MLX source
      uses: actions/cache@v4
      with:
        path: |
          build/_deps/mlx-src
          build/_deps/mlx-subbuild
        key: mlx-src-macos-${{ hashFiles('CMakeLists.txt') }}

    - name: Build MLX Engine (macOS)
      run: |
        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_CLANG_TIDY= \
          -DCLANG_TIDY_EXE=CLANG_TIDY_EXE-NOTFOUND \
          -DMINJA_EXAMPLE_ENABLED=OFF \
          -DMLX_LM_BUILD_TESTS=ON \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(sysctl -n hw.ncpu)

    - name: Run unit tests
      run: |
        cd build
        ctest --test-dir tests -R "test_types|test_config|test_generate|test_kv_cache|test_chat_template|test_rope_utils" \
          --output-on-failure --timeout 120

    - name: Package build artifacts
      run: |
        mkdir -p output
        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-macos-arm64
        path: output/
        retention-days: 30

  create-release:
    needs: [prepare-matrix, build-ubuntu-rocm, build-ubuntu-cpu, build-macos]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    if: |
      always() &&
      (needs.build-ubuntu-rocm.result == 'success' || needs.build-ubuntu-cpu.result == 'success' || needs.build-macos.result == 'success') &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == null) ||
       github.event_name == 'schedule')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Download all build artifacts
      uses: actions/download-artifact@v6
      with:
        path: ./all-artifacts

    - name: Generate release tag
      id: generate-tag
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        existing_tags=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' \
          | grep -E "^b[0-9]{4}(-[a-z]+)?$" | sed 's/-.*$//' | sort -uV || echo "")

        if [ -z "$existing_tags" ]; then
          next_number=1000
          echo "No existing sequential release tags found, starting with b1000"
        else
          highest_tag=$(echo "$existing_tags" | tail -n 1)
          highest_number=$(echo "$highest_tag" | sed 's/^b//')
          next_number=$((highest_number + 1))
          echo "Highest existing tag: $highest_tag (number: $highest_number)"
        fi

        TAG=$(printf "b%04d" $next_number)
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Generated release tag: ${TAG}"

    - name: Check if tag already exists
      id: check-tag
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"
        if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
          echo "Tag $TAG already exists, skipping release creation"
          echo "tag_exists=true" >> $GITHUB_OUTPUT
        else
          echo "tag_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Create archives
      if: steps.check-tag.outputs.tag_exists == 'false'
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"

        for channel in stable preview; do
          artifact_dir="./all-artifacts/mlx-engine-ubuntu-rocm-${channel}-x64"
          archive_name="mlx-engine-${TAG}-ubuntu-rocm-${channel}-x64"
          if [ -d "$artifact_dir" ]; then
            echo "Creating archive: ${archive_name}.zip"
            cd "$artifact_dir"
            zip -9 -r "../../${archive_name}.zip" *
            cd ../../
          fi
        done

        if [ -d "./all-artifacts/mlx-engine-ubuntu-cpu-x64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-ubuntu-cpu-x64.zip"
          cd "./all-artifacts/mlx-engine-ubuntu-cpu-x64"
          zip -9 -r "../../mlx-engine-${TAG}-ubuntu-cpu-x64.zip" *
          cd ../../
        fi

        if [ -d "./all-artifacts/mlx-engine-macos-arm64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-macos-arm64.zip"
          cd "./all-artifacts/mlx-engine-macos-arm64"
          zip -9 -r "../../mlx-engine-${TAG}-macos-arm64.zip" *
          cd ../../
        fi

        echo "Created archives:"
        ls -la *.zip 2>/dev/null || echo "No archives created"

    - name: Create Release
      if: steps.check-tag.outputs.tag_exists == 'false'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"

        upload_files=$(ls *.zip 2>/dev/null | tr '\n' ' ')

        if [ -z "$upload_files" ]; then
          echo "No archives to upload, skipping release"
          exit 0
        fi

        echo "Files to upload: $upload_files"

        gh release create "$TAG" \
          --title "$TAG" \
          --notes "**Build Number**: $TAG
        **Build Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

        MLX Engine binaries with ROCm, CPU, and macOS support.
        **Requires system ROCm installation** — ROCm libraries are not bundled.

        ### Downloads
        - **Ubuntu ROCm (stable)**: mlx-engine-${TAG}-ubuntu-rocm-stable-x64.zip
        - **Ubuntu ROCm (preview)**: mlx-engine-${TAG}-ubuntu-rocm-preview-x64.zip
        - **Ubuntu CPU**: mlx-engine-${TAG}-ubuntu-cpu-x64.zip
        - **macOS ARM64**: mlx-engine-${TAG}-macos-arm64.zip" \
          $upload_files
