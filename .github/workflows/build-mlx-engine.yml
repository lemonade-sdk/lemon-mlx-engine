name: Build MLX Engine
on:
  workflow_dispatch:
    inputs:
      operating_systems:
        description: 'Operating systems to build for (comma-separated: ubuntu,macos)'
        required: false
        default: 'ubuntu,macos'
      gfx_target:
        description: 'AMD GPU targets for ROCm builds (comma-separated)'
        required: false
        default: 'gfx110X,gfx1150,gfx1151,gfx120X,gfx115X_gfx120X'
      rocm_channel:
        description: 'ROCm channel: preview (7.2.1 from AMD apt) or stable (7.12.x from AMD apt). Both sourced directly from https://repo.radeon.com/rocm/apt/. Only these two values are accepted.'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - stable
      create_release:
        description: 'Create a GitHub release after successful build'
        required: false
        default: true
        type: boolean

  pull_request:
    types: [opened, synchronize, reopened]

  schedule:
    # Daily: preview channel (ROCm 7.2.1 from AMD apt)
    - cron: '0 14 * * *'
    # Weekly Monday: stable channel (ROCm 7.12.x from AMD apt)
    - cron: '0 16 * * 1'

env:
  OPERATING_SYSTEMS: ${{ github.event.inputs.operating_systems || 'ubuntu,macos' }}
  GFX_TARGETS: ${{ github.event.inputs.gfx_target || 'gfx110X,gfx1150,gfx1151,gfx120X,gfx115X_gfx120X' }}
  ROCM_CHANNEL: ${{ github.event.inputs.rocm_channel || (github.event.schedule == '0 16 * * 1' && 'stable') || 'preview' }}

jobs:
  # ---------------------------------------------------------------------------
  # Prepare build matrices
  # ---------------------------------------------------------------------------
  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      rocm_matrix: ${{ steps.set-matrix.outputs.rocm_matrix }}
      should_build_ubuntu_rocm: ${{ steps.set-matrix.outputs.should_build_ubuntu_rocm }}
      should_build_ubuntu_cpu: ${{ steps.set-matrix.outputs.should_build_ubuntu_cpu }}
      should_build_macos: ${{ steps.set-matrix.outputs.should_build_macos }}
    steps:
    - name: Set matrix
      id: set-matrix
      run: |
        targets="${{ env.GFX_TARGETS }}"
        operating_systems="${{ env.OPERATING_SYSTEMS }}"

        echo "Input targets: $targets"
        echo "Input operating systems: $operating_systems"

        # Convert targets to JSON array for ROCm matrix
        matrix_targets=$(echo "$targets" \
          | tr ',' '\n' \
          | sed 's/^ *//;s/ *$//' \
          | sed 's/^"//;s/"$//' \
          | jq -R . \
          | jq -s '{gfx_target: .}' \
          | jq -c)

        should_build_ubuntu_rocm="false"
        should_build_ubuntu_cpu="false"
        should_build_macos="false"

        if [[ "$operating_systems" == *"ubuntu"* ]]; then
          should_build_ubuntu_rocm="true"
          should_build_ubuntu_cpu="true"
          echo "rocm_matrix=$matrix_targets" >> $GITHUB_OUTPUT
        fi

        if [[ "$operating_systems" == *"macos"* ]]; then
          should_build_macos="true"
        fi

        echo "should_build_ubuntu_rocm=$should_build_ubuntu_rocm" >> $GITHUB_OUTPUT
        echo "should_build_ubuntu_cpu=$should_build_ubuntu_cpu" >> $GITHUB_OUTPUT
        echo "should_build_macos=$should_build_macos" >> $GITHUB_OUTPUT

        echo "Ubuntu ROCm build: $should_build_ubuntu_rocm"
        echo "Ubuntu CPU build: $should_build_ubuntu_cpu"
        echo "macOS build: $should_build_macos"

  # ---------------------------------------------------------------------------
  # Ubuntu + ROCm build (per GPU target)
  # ---------------------------------------------------------------------------
  build-ubuntu-rocm:
    runs-on: ubuntu-22.04
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_ubuntu_rocm == 'true'
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.rocm_matrix) }}
      fail-fast: false
    outputs:
      rocm_version: ${{ steps.set-outputs.outputs.rocm_version }}
      rocm_channel: ${{ steps.set-outputs.outputs.rocm_channel }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build patchelf unzip curl \
          libcurl4-openssl-dev libopenblas-dev liblapacke-dev pkg-config

    - name: Validate ROCm channel
      env:
        CHANNEL: ${{ env.ROCM_CHANNEL }}
      run: |
        # Allowlist: only 'preview' (7.2.1) or 'stable' (7.12.0) are accepted.
        # Both channels must resolve to https://repo.amd.com/rocm/tarball/. Any
        # other channel or source (distro packages, apt-PPA, nightlies, etc.)
        # is rejected here before any install step runs. Mirrors the pattern
        # used by lemonade-sdk/whisper.cpp-rocm.
        case "$CHANNEL" in
          preview|stable) ;;
          *)
            echo "::error::Unsupported ROCm channel '$CHANNEL'."
            echo "::error::Allowed channels: preview (ROCm 7.2.1), stable (ROCm 7.12.0)."
            echo "::error::Both channels are sourced from https://repo.amd.com/rocm/tarball/."
            exit 1
            ;;
        esac
        config_channels=$(jq -r '._allowed_channels | join(",")' .github/rocm-channels.json)
        echo "Config allowlist: $config_channels"
        echo "Selected channel: $CHANNEL"

    - name: Resolve ROCm version for channel
      id: resolve-rocm
      run: |
        channel="${{ env.ROCM_CHANNEL }}"
        rocm_version=$(jq -r ".${channel}.version" .github/rocm-channels.json)
        rocm_source=$(jq -r ".${channel}.source" .github/rocm-channels.json)

        if [ "$rocm_source" != "amd-tarball" ]; then
          echo "::error::${channel} channel source must be 'amd-tarball', got '$rocm_source'"
          exit 1
        fi
        if [ -z "$rocm_version" ] || [ "$rocm_version" = "null" ]; then
          echo "::error::${channel} channel is missing a pinned version in rocm-channels.json"
          exit 1
        fi

        echo "Channel $channel → ROCm $rocm_version (source: $rocm_source)"
        echo "ROCM_VERSION=$rocm_version" >> $GITHUB_ENV

    - name: Download and extract ROCm tarball to /opt/rocm
      run: |
        source ci/resolve-rocm-version.sh linux "${{ matrix.gfx_target }}" "${{ env.ROCM_VERSION }}"
        echo "DETECTED_ROCM_VERSION=$ROCM_RESOLVED_VERSION" >> $GITHUB_ENV
        echo "DETECTED_ROCM_CHANNEL=${{ env.ROCM_CHANNEL }}" >> $GITHUB_ENV

        sudo mkdir -p /opt/rocm
        curl -sL "$ROCM_TARBALL_URL" | sudo tar --use-compress-program=gzip -xf - -C /opt/rocm --strip-components=1

        echo "Installed ROCm $ROCM_RESOLVED_VERSION (channel: ${{ env.ROCM_CHANNEL }}) from $ROCM_TARBALL_URL"

    - name: Set ROCm environment variables
      run: |
        echo "HIP_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "ROCM_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "HIP_PLATFORM=amd" >> $GITHUB_ENV
        echo "/opt/rocm/bin:/opt/rocm/llvm/bin:/opt/rocm/lib/llvm/bin:$PATH" >> $GITHUB_PATH

    - name: Locate ROCm clang + bitcode
      id: rocm-paths
      run: |
        # TheRock tarball layout can vary between releases (llvm/bin vs lib/llvm/bin).
        # Discover the actual clang and bitcode paths instead of hardcoding.
        CLANG_PATH=$(find /opt/rocm -type f -name clang -executable -path '*/llvm/bin/*' -print -quit)
        if [ -z "$CLANG_PATH" ]; then
          CLANG_PATH=$(find /opt/rocm -type f -name amdclang -executable -path '*/llvm/bin/*' -print -quit)
        fi
        if [ -z "$CLANG_PATH" ]; then
          echo "::error::Could not locate clang under /opt/rocm/**/llvm/bin"
          find /opt/rocm -maxdepth 5 -type d -name bin
          exit 1
        fi
        CLANGXX_PATH="${CLANG_PATH}++"
        if [ ! -x "$CLANGXX_PATH" ]; then
          # amdclang uses amdclang++
          CLANGXX_PATH="${CLANG_PATH%clang}clang++"
          [ -x "$CLANGXX_PATH" ] || CLANGXX_PATH="${CLANG_PATH}++"
        fi

        BITCODE_PATH=$(find /opt/rocm -type d -name bitcode -print -quit)
        if [ -z "$BITCODE_PATH" ]; then
          echo "::error::Could not find 'bitcode' directory in /opt/rocm"
          find /opt/rocm -maxdepth 5
          exit 1
        fi

        echo "clang:    $CLANG_PATH"
        echo "clang++:  $CLANGXX_PATH"
        echo "bitcode:  $BITCODE_PATH"

        echo "clang=$CLANG_PATH" >> $GITHUB_OUTPUT
        echo "clangxx=$CLANGXX_PATH" >> $GITHUB_OUTPUT
        echo "bitcode=$BITCODE_PATH" >> $GITHUB_OUTPUT

    - name: Map GPU targets
      id: map-targets
      run: |
        current_target="${{ matrix.gfx_target }}"
        case "$current_target" in
          gfx110X) mapped="gfx1100;gfx1101;gfx1102" ;;
          gfx103X) mapped="gfx1030;gfx1031;gfx1032;gfx1034" ;;
          gfx1151) mapped="gfx1151" ;;
          gfx1150) mapped="gfx1150" ;;
          gfx120X) mapped="gfx1200;gfx1201" ;;
          gfx115X_gfx120X) mapped="gfx1150;gfx1151;gfx1200;gfx1201" ;;
          *) mapped="$current_target" ;;
        esac
        echo "mapped_target=$mapped" >> $GITHUB_OUTPUT
        echo "Mapped target: $mapped"

    - name: Build MLX Engine + ROCm
      run: |
        export HIP_PATH=/opt/rocm
        export ROCM_PATH=/opt/rocm
        export PATH="/opt/rocm/bin:$PATH"

        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER="${{ steps.rocm-paths.outputs.clang }}" \
          -DCMAKE_CXX_COMPILER="${{ steps.rocm-paths.outputs.clangxx }}" \
          -DCMAKE_HIP_FLAGS="--rocm-path=/opt/rocm --rocm-device-lib-path=${{ steps.rocm-paths.outputs.bitcode }}" \
          -DCMAKE_PREFIX_PATH=/opt/rocm \
          -DCMAKE_HIP_ARCHITECTURES="${{ steps.map-targets.outputs.mapped_target }}" \
          -DMLX_BUILD_ROCM=ON \
          -DMLX_LM_BUILD_TESTS=OFF \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(nproc)

    - name: Package build artifacts
      run: |
        mkdir -p output

        # Copy binaries
        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        # Bundle small non-ROCm libs for portability (ROCm libs come from system install)
        for lib in libopenblas.so* liblapacke.so* libgfortran.so*; do
          cp /usr/lib/x86_64-linux-gnu/$lib output/ 2>/dev/null || true
        done

        # Set RPATH: check local dir first, then system ROCm
        for binary in output/server output/chat output/diagnose; do
          if [ -f "$binary" ]; then
            patchelf --set-rpath '$ORIGIN:/opt/rocm/lib' "$binary" 2>/dev/null || true
          fi
        done

        echo "Packaged artifacts (no ROCm libs bundled — requires system ROCm):"
        ls -lh output/

    - name: Set outputs
      id: set-outputs
      run: |
        echo "rocm_version=${{ env.DETECTED_ROCM_VERSION }}" >> $GITHUB_OUTPUT
        echo "rocm_channel=${{ env.ROCM_CHANNEL }}" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-ubuntu-rocm-${{ env.ROCM_CHANNEL }}-${{ matrix.gfx_target }}-x64
        path: output/
        retention-days: 30

  # ---------------------------------------------------------------------------
  # Ubuntu CPU-only build
  # ---------------------------------------------------------------------------
  build-ubuntu-cpu:
    runs-on: ubuntu-22.04
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_ubuntu_cpu == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build \
          libcurl4-openssl-dev libopenblas-dev liblapacke-dev pkg-config

    - name: Build MLX Engine (CPU only)
      run: |
        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DMLX_BUILD_ROCM=OFF \
          -DMLX_LM_BUILD_TESTS=ON \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(nproc)

    - name: Run unit tests (CPU-safe only)
      run: |
        cd build
        ctest --test-dir tests -R "test_types|test_config|test_generate|test_kv_cache|test_chat_template|test_rope_utils" \
          --output-on-failure --timeout 120

    - name: Package build artifacts
      run: |
        mkdir -p output
        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        # Bundle runtime libs for portability
        for lib in libopenblas.so* liblapacke.so* libgfortran.so*; do
          cp /usr/lib/x86_64-linux-gnu/$lib output/ 2>/dev/null || true
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-ubuntu-cpu-x64
        path: output/
        retention-days: 30

  # ---------------------------------------------------------------------------
  # macOS build (Metal / CPU)
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_macos == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        brew install cmake ninja curl

    - name: Build MLX Engine (macOS)
      run: |
        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DMLX_LM_BUILD_TESTS=ON \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(sysctl -n hw.ncpu)

    - name: Run unit tests
      run: |
        cd build
        ctest --test-dir tests -R "test_types|test_config|test_generate|test_kv_cache|test_chat_template|test_rope_utils" \
          --output-on-failure --timeout 120

    - name: Package build artifacts
      run: |
        mkdir -p output
        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-macos-arm64
        path: output/
        retention-days: 30

  # ---------------------------------------------------------------------------
  # Create Release
  # ---------------------------------------------------------------------------
  create-release:
    needs: [prepare-matrix, build-ubuntu-rocm, build-ubuntu-cpu, build-macos]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    if: |
      always() &&
      (needs.build-ubuntu-rocm.result == 'success' || needs.build-ubuntu-cpu.result == 'success' || needs.build-macos.result == 'success') &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == null) ||
       github.event_name == 'schedule')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Download all build artifacts
      uses: actions/download-artifact@v6
      with:
        path: ./all-artifacts

    - name: Generate release tag
      id: generate-tag
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        channel="${{ env.ROCM_CHANNEL }}"
        # Match tags for this channel: b1000-stable, b1001-preview, etc.
        existing_tags=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' \
          | grep -E "^b[0-9]{4}(-${channel})?$" | sed 's/-.*$//' | sort -V || echo "")

        if [ -z "$existing_tags" ]; then
          next_number=1000
          echo "No existing sequential release tags found, starting with b1000"
        else
          highest_tag=$(echo "$existing_tags" | tail -n 1)
          highest_number=$(echo "$highest_tag" | sed 's/^b//')
          next_number=$((highest_number + 1))
          echo "Highest existing tag: $highest_tag (number: $highest_number)"
        fi

        TAG=$(printf "b%04d-${channel}" $next_number)
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Generated release tag: ${TAG}"

    - name: Check if tag already exists
      id: check-tag
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"
        if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
          echo "Tag $TAG already exists, skipping release creation"
          echo "tag_exists=true" >> $GITHUB_OUTPUT
        else
          echo "tag_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Create archives
      if: steps.check-tag.outputs.tag_exists == 'false'
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"
        targets="${{ env.GFX_TARGETS }}"
        channel="${{ env.ROCM_CHANNEL }}"

        echo "Processing artifacts for release $TAG (channel: $channel)"

        # ROCm builds
        IFS=',' read -ra TARGET_ARRAY <<< "$targets"
        for target in "${TARGET_ARRAY[@]}"; do
          target=$(echo "$target" | xargs)
          artifact_dir="./all-artifacts/mlx-engine-ubuntu-rocm-${channel}-${target}-x64"
          archive_name="mlx-engine-${TAG}-ubuntu-rocm-${channel}-${target}-x64"
          if [ -d "$artifact_dir" ]; then
            echo "Creating archive: ${archive_name}.zip"
            cd "$artifact_dir"
            zip -9 -r "../../${archive_name}.zip" *
            cd ../../
          fi
        done

        # CPU build
        if [ -d "./all-artifacts/mlx-engine-ubuntu-cpu-x64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-ubuntu-cpu-x64.zip"
          cd "./all-artifacts/mlx-engine-ubuntu-cpu-x64"
          zip -9 -r "../../mlx-engine-${TAG}-ubuntu-cpu-x64.zip" *
          cd ../../
        fi

        # macOS build
        if [ -d "./all-artifacts/mlx-engine-macos-arm64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-macos-arm64.zip"
          cd "./all-artifacts/mlx-engine-macos-arm64"
          zip -9 -r "../../mlx-engine-${TAG}-macos-arm64.zip" *
          cd ../../
        fi

        echo "Created archives:"
        ls -la *.zip 2>/dev/null || echo "No archives created"

    - name: Create Release
      if: steps.check-tag.outputs.tag_exists == 'false'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"
        ROCM_VERSION="${{ needs.build-ubuntu-rocm.outputs.rocm_version }}"
        ROCM_CHANNEL="${{ needs.build-ubuntu-rocm.outputs.rocm_channel }}"
        targets="${{ env.GFX_TARGETS }}"

        # Collect all zip files
        upload_files=$(ls *.zip 2>/dev/null | tr '\n' ' ')

        if [ -z "$upload_files" ]; then
          echo "No archives to upload, skipping release"
          exit 0
        fi

        echo "Files to upload: $upload_files"

        gh release create "$TAG" \
          --title "$TAG" \
          --notes "**Build Number**: $TAG
        **ROCm Channel**: $ROCM_CHANNEL
        **ROCm Version**: $ROCM_VERSION
        **GPU Target(s)**: $targets
        **Build Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

        MLX Engine binaries with ROCm, CPU, and macOS support.
        **Requires system ROCm installation** — ROCm libraries are not bundled.

        ### Downloads
        - **Ubuntu ROCm**: mlx-engine-${TAG}-ubuntu-rocm-${ROCM_CHANNEL}-{target}-x64.zip
        - **Ubuntu CPU**: mlx-engine-${TAG}-ubuntu-cpu-x64.zip
        - **macOS ARM64**: mlx-engine-${TAG}-macos-arm64.zip" \
          $upload_files
