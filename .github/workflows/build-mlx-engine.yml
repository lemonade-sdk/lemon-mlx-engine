name: Build MLX Engine
on:
  workflow_dispatch:
    inputs:
      operating_systems:
        description: 'Operating systems to build for (comma-separated: ubuntu,macos)'
        required: false
        default: 'ubuntu,macos'
      create_release:
        description: 'Cut a GitHub release after a successful build (auto-tagged b<NNNN>-stable). Uncheck for build-only.'
        required: false
        default: true
        type: boolean
      hip_device:
        description: 'Override HIP device index for the GPU smoke test (blank = use the per-matrix default)'
        required: false
        default: ''

  pull_request:
    types: [opened, synchronize, reopened]

  schedule:
    - cron: '0 14 * * *'

env:
  OPERATING_SYSTEMS: ${{ github.event.inputs.operating_systems || 'ubuntu,macos' }}
  ROCM_VERSION: '7.13'
  ROCM_ARCH: 'gfx1151'

jobs:
  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      should_build_ubuntu_rocm: ${{ steps.set-matrix.outputs.should_build_ubuntu_rocm }}
      should_build_ubuntu_cpu: ${{ steps.set-matrix.outputs.should_build_ubuntu_cpu }}
      should_build_macos: ${{ steps.set-matrix.outputs.should_build_macos }}
    steps:
    - name: Set matrix
      id: set-matrix
      run: |
        operating_systems="${{ env.OPERATING_SYSTEMS }}"
        echo "Input operating systems: $operating_systems"

        should_build_ubuntu_rocm="false"
        should_build_ubuntu_cpu="false"
        should_build_macos="false"

        if [[ "$operating_systems" == *"ubuntu"* ]]; then
          should_build_ubuntu_rocm="true"
          should_build_ubuntu_cpu="true"
        fi

        if [[ "$operating_systems" == *"macos"* ]]; then
          should_build_macos="true"
        fi

        echo "should_build_ubuntu_rocm=$should_build_ubuntu_rocm" >> $GITHUB_OUTPUT
        echo "should_build_ubuntu_cpu=$should_build_ubuntu_cpu" >> $GITHUB_OUTPUT
        echo "should_build_macos=$should_build_macos" >> $GITHUB_OUTPUT

        echo "Ubuntu ROCm build: $should_build_ubuntu_rocm"
        echo "Ubuntu CPU build: $should_build_ubuntu_cpu"
        echo "macOS build: $should_build_macos"

  build-ubuntu-rocm:
    name: build-ubuntu-rocm
    runs-on: [self-hosted, Linux, X64, gfx1151]
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_ubuntu_rocm == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install ROCm ${{ env.ROCM_VERSION }} (${{ env.ROCM_ARCH }})
      run: |
        ROCM_VER="${{ env.ROCM_VERSION }}"
        ROCM_ARCH="${{ env.ROCM_ARCH }}"

        # Self-hosted runners are expected to pre-install ROCm; this step only
        # verifies the packages are present. Package naming differs by ROCm
        # series:
        #   7.13: amdrocm7.13-gfx1151 + amdrocm-core-dev7.13  (no arch suffix)
        #   7.14: amdrocm7.14-gfx1151 + amdrocm-core-dev7.14-gfx1151
        pkg_ok() { dpkg -s "$1" 2>/dev/null | grep -q "Status: install ok installed"; }

        RUNTIME_PKG="amdrocm${ROCM_VER}-${ROCM_ARCH}"
        CORE_DEV_ARCH="amdrocm-core-dev${ROCM_VER}-${ROCM_ARCH}"
        CORE_DEV_VER="amdrocm-core-dev${ROCM_VER}"

        if pkg_ok "$RUNTIME_PKG" && { pkg_ok "$CORE_DEV_ARCH" || pkg_ok "$CORE_DEV_VER"; }; then
          echo "ROCm ${ROCM_VER} ${ROCM_ARCH} packages already installed; skipping."
          dpkg -l | grep -E "amdrocm${ROCM_VER}|amdrocm-core-dev${ROCM_VER}" | head -20 || true
          exit 0
        fi

        echo "ERROR: required ROCm packages not installed on this runner."
        echo "  need: $RUNTIME_PKG"
        echo "  and:  $CORE_DEV_ARCH  OR  $CORE_DEV_VER"
        echo "Installed amdrocm packages:"
        dpkg -l 'amdrocm*' 2>/dev/null | head -40 || true
        exit 1

    - name: Set ROCm environment variables
      run: |
        ROCM_VER="${{ env.ROCM_VERSION }}"
        echo "HIP_PATH=/opt/rocm/core-${ROCM_VER}" >> $GITHUB_ENV
        echo "ROCM_PATH=/opt/rocm/core-${ROCM_VER}" >> $GITHUB_ENV
        echo "HIP_PLATFORM=amd" >> $GITHUB_ENV
        echo "/opt/rocm/core-${ROCM_VER}/bin:/opt/rocm/core-${ROCM_VER}/lib/llvm/bin:$PATH" >> $GITHUB_PATH

    # Host CPU BLAS/LAPACK + curl are required by MLX even for ROCm builds.
    # Keep this idempotent so a freshly provisioned self-hosted runner recovers.
    - name: Ensure host build dependencies
      run: |
        sudo apt-get update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          cmake ninja-build \
          libcurl4-openssl-dev \
          libopenblas-dev liblapacke-dev \
          pkg-config \
          g++-13

    - name: Cache FetchContent MLX source
      uses: actions/cache@v4
      with:
        path: |
          build/_deps/mlx-src
          build/_deps/mlx-subbuild
        key: mlx-src-linux-${{ runner.name }}-${{ hashFiles('CMakeLists.txt') }}

    - name: Build MLX Engine
      env:
        ROCM_VER: ${{ env.ROCM_VERSION }}
        ROCM_ARCH: ${{ env.ROCM_ARCH }}
      run: |
        ROCM_VER="${{ env.ROCM_VERSION }}"
        ROCM_ARCH="${{ env.ROCM_ARCH }}"

        # Pin clang (ROCm 7.13 = clang 23) to GCC 13's libstdc++.
        GCC_INSTALL_DIR="/usr/lib/gcc/x86_64-linux-gnu/13"

        # Clear FetchContent cache to force fresh MLX source checkout
        rm -rf build/_deps/

        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_HIP_COMPILER=hipcc \
          -DCMAKE_PREFIX_PATH=/opt/rocm/core-${ROCM_VER} \
          -DCMAKE_HIP_ARCHITECTURES="${ROCM_ARCH}" \
          -DCMAKE_C_FLAGS="--gcc-install-dir=${GCC_INSTALL_DIR}" \
          -DCMAKE_CXX_FLAGS="--gcc-install-dir=${GCC_INSTALL_DIR}" \
          -DCMAKE_HIP_FLAGS="--gcc-install-dir=${GCC_INSTALL_DIR}" \
          -DCMAKE_CXX_CLANG_TIDY= \
          -DCLANG_TIDY_EXE=CLANG_TIDY_EXE-NOTFOUND \
          -DMINJA_EXAMPLE_ENABLED=OFF \
          -DMLX_BUILD_ROCM=ON \
          -DMLX_LM_BUILD_TESTS=OFF \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(nproc)

    - name: Package build artifacts
      run: |
        mkdir -p output

        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        for lib in libopenblas.so* liblapacke.so* libgfortran.so*; do
          cp /usr/lib/x86_64-linux-gnu/$lib output/ 2>/dev/null || true
        done

        echo "Packaged artifacts:"
        ls -lh output/

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-ubuntu-rocm-x64
        path: output/
        retention-days: 30

  build-ubuntu-cpu:
    runs-on: ubuntu-22.04
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_ubuntu_cpu == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build \
          libcurl4-openssl-dev libopenblas-dev liblapacke-dev pkg-config

    - name: Cache FetchContent MLX source
      uses: actions/cache@v4
      with:
        path: |
          build/_deps/mlx-src
          build/_deps/mlx-subbuild
        key: mlx-src-linux-${{ hashFiles('CMakeLists.txt') }}

    - name: Build MLX Engine (CPU only)
      run: |
        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_CLANG_TIDY= \
          -DCLANG_TIDY_EXE=CLANG_TIDY_EXE-NOTFOUND \
          -DMINJA_EXAMPLE_ENABLED=OFF \
          -DMLX_BUILD_ROCM=OFF \
          -DMLX_LM_BUILD_TESTS=ON \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(nproc)

    - name: Run unit tests (CPU-safe only)
      run: |
        cd build
        ctest --test-dir tests -R "test_types|test_config|test_generate|test_kv_cache|test_chat_template|test_rope_utils" \
          --output-on-failure --timeout 120

    - name: Package build artifacts
      run: |
        mkdir -p output
        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        for lib in libopenblas.so* liblapacke.so* libgfortran.so*; do
          cp /usr/lib/x86_64-linux-gnu/$lib output/ 2>/dev/null || true
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-ubuntu-cpu-x64
        path: output/
        retention-days: 30

  build-macos:
    # Pinned: macos-latest moved to macOS 26 (Xcode 26 / SDK 26), whose Metal
    # toolchain compiles the metallib as MSL 4.0 — not loadable on the test
    # runner's Metal runtime. macos-15 keeps the metallib at MSL 3.2.
    runs-on: macos-15
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_macos == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        brew install cmake ninja curl

    - name: Cache FetchContent MLX source
      uses: actions/cache@v4
      with:
        path: |
          build/_deps/mlx-src
          build/_deps/mlx-subbuild
        key: mlx-src-macos-${{ hashFiles('CMakeLists.txt') }}

    - name: Build MLX Engine (macOS)
      run: |
        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_CLANG_TIDY= \
          -DCLANG_TIDY_EXE=CLANG_TIDY_EXE-NOTFOUND \
          -DMINJA_EXAMPLE_ENABLED=OFF \
          -DMLX_LM_BUILD_TESTS=ON \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(sysctl -n hw.ncpu)

    - name: Run unit tests
      run: |
        cd build
        ctest --test-dir tests -R "test_types|test_config|test_generate|test_kv_cache|test_chat_template|test_rope_utils" \
          --output-on-failure --timeout 120

    - name: Package build artifacts
      run: |
        mkdir -p output
        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        METALLIB=$(find build -name "mlx.metallib" 2>/dev/null | head -1)
        if [ -n "$METALLIB" ]; then
          echo "Found metalllib: $METALLIB"
          cp "$METALLIB" output/
        else
          echo "WARNING: mlx.metallib not found in build tree"
          find build -name "*.metallib" 2>/dev/null || true
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-macos-arm64
        path: output/
        retention-days: 30

  test-simple-math:
    name: test-simple-math-${{ matrix.os }}
    needs: [build-ubuntu-rocm, build-ubuntu-cpu, build-macos]
    if: |
      always() &&
      (needs.build-ubuntu-rocm.result == 'success' ||
       needs.build-ubuntu-cpu.result == 'success' ||
       needs.build-macos.result == 'success')
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    timeout-minutes: ${{ matrix.timeout_minutes || 20 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-rocm
            artifact: mlx-engine-ubuntu-rocm-x64
            runs_on: '["self-hosted", "Linux", "X64", "gfx1151"]'
            install_rocm: true
            hip_device: 0          # gfx1151 APU (HIP device 0); R9700 is device 1
            model: mlx-community/Qwen3.5-0.8B-4bit
            use_mtp: false
            no_think: false
          # Temporarily disabled: the GPU MTP smoke test (Qwen3.5-4B-MTP-4bit)
          # fails the server/health step on the self-hosted runner. Re-enable
          # once MTP inference on ROCm is fixed.
          # - os: ubuntu-mtp
          #   artifact: mlx-engine-ubuntu-rocm-x64
          #   runs_on: '["self-hosted", "Linux", "X64", "gfx1151"]'
          #   install_rocm: true
          #   hip_device: 0          # gfx1151 APU (HIP device 0); R9700 is device 1
          #   model: mlx-community/Qwen3.5-4B-MTP-4bit
          #   use_mtp: true
          #   no_think: true
          #   timeout_minutes: 30
          - os: ubuntu-cpu
            artifact: mlx-engine-ubuntu-cpu-x64
            runs_on: '"ubuntu-22.04"'
            install_rocm: false
            model: mlx-community/Qwen3.5-0.8B-4bit
            use_mtp: false
            no_think: false
          # Temporarily disabled along with the GPU MTP test (see above).
          # - os: ubuntu-cpu-mtp
          #   artifact: mlx-engine-ubuntu-cpu-x64
          #   runs_on: '"ubuntu-22.04"'
          #   install_rocm: false
          #   model: mlx-community/Qwen3.5-4B-MTP-4bit
          #   use_mtp: true
          #   no_think: true
          #   timeout_minutes: 30
          - os: macos-arm64
            artifact: mlx-engine-macos-arm64
            runs_on: '"macos-15"'
            install_rocm: false
            model: mlx-community/Qwen3.5-0.8B-4bit
            use_mtp: false
            no_think: false
    steps:
    - name: ROCm runtime setup (Ubuntu ROCm only)
      if: matrix.install_rocm
      run: |
        ROCM_VER="${{ env.ROCM_VERSION }}"
        ROCM_ARCH="${{ env.ROCM_ARCH }}"

        ROCM_INSTALLED="false"
        if dpkg -s "amdrocm${ROCM_VER}-${ROCM_ARCH}" 2>/dev/null | grep -q "Status: install ok installed"; then
          echo "ROCm ${ROCM_VER} ${ROCM_ARCH} package already installed"
          ROCM_INSTALLED="true"
        fi

        if [ "${ROCM_INSTALLED}" = "false" ]; then
          exit 1
        fi

    - name: Download build artifact
      uses: actions/download-artifact@v6
      with:
        name: ${{ matrix.artifact }}
        path: mlx-binaries

    - name: Pre-cache model
      run: |
        python3 -m venv .venv
        source .venv/bin/activate
        pip install huggingface-hub
        python3 -c "
        from huggingface_hub import snapshot_download
        snapshot_download(
            repo_id='${{ matrix.model }}',
            allow_patterns=['*.json', '*.safetensors'],
        )
        print('Model cached successfully')
        "

    - name: Make binaries executable
      run: chmod +x mlx-binaries/server

    - name: Set library path
      run: |
        if [ "$(uname)" = "Darwin" ]; then
          echo "DYLD_LIBRARY_PATH=$PWD/mlx-binaries" >> $GITHUB_ENV
        elif [ -d "/opt/rocm/core-${{ env.ROCM_VERSION }}/lib" ]; then
          echo "LD_LIBRARY_PATH=$PWD/mlx-binaries:/opt/rocm/core-${{ env.ROCM_VERSION }}/lib" >> $GITHUB_ENV
        elif [ -d /opt/rocm/lib ]; then
          echo "LD_LIBRARY_PATH=$PWD/mlx-binaries:/opt/rocm/lib" >> $GITHUB_ENV
        else
          echo "LD_LIBRARY_PATH=$PWD/mlx-binaries" >> $GITHUB_ENV
        fi

    - name: Memory pre-check (MTP test)
      if: matrix.use_mtp
      run: |
        total_mem_mb=$(free -m | awk '/^Mem:/{print $2}')
        echo "Total system memory: ${total_mem_mb} MB"
        free_mem_mb=$(free -m | awk '/^Mem:/{print $7}')
        echo "Available memory: ${free_mem_mb} MB"
        if [ "$free_mem_mb" -lt 4000 ]; then
          echo "SKIP: Insufficient memory for MTP test (${free_mem_mb}MB < 4000MB required)"
          exit 0
        else
          echo "Memory OK for MTP test"
        fi

    - name: Select GPU device (pin smoke test to the matrix gfx card)
      if: matrix.install_rocm
      run: |
        # The self-hosted gfx1151 runner has two AMD GPUs: the gfx1151 APU
        # (HIP device 0, unified memory) and a gfx1201 R9700 (HIP device 1).
        # Without an explicit pin the server can initialize on the wrong card —
        # and with a global HSA_OVERRIDE_GFX_VERSION the R9700 masquerades as
        # gfx1151 and runs the wrong ISA (garbage output / failed inference).
        # Pin HIP_VISIBLE_DEVICES to this matrix entry's device. Override with
        # the workflow_dispatch 'hip_device' input.
        dev="${{ matrix.hip_device }}"
        override="${{ github.event.inputs.hip_device }}"
        [ -n "$override" ] && dev="$override"
        [ -z "$dev" ] && dev=0
        echo "HIP_VISIBLE_DEVICES=$dev" >> "$GITHUB_ENV"
        echo "Pinned smoke test to HIP_VISIBLE_DEVICES=$dev"
        # Best-effort log of the visible GPUs for diagnosis.
        chmod +x mlx-binaries/chat 2>/dev/null || true
        mlx-binaries/chat --list-devices 2>/dev/null || true

    - name: 'Smoke test: server start and health'
      run: |
        set -e

        PORT=18999

        # Conditionally enable MTP speculative decoding
        MTP_FLAG=""
        if [ "${{ matrix.use_mtp }}" = "true" ]; then
          MTP_FLAG="--use-mtp --n-draft-tokens 3"
        fi

        # Disable thinking/reasoning for deterministic, fast answers in smoke tests
        NO_THINK_FLAG=""
        if [ "${{ matrix.no_think }}" = "true" ]; then
          NO_THINK_FLAG="--no-think"
        fi

        # Increase readiness timeout for MTP models
        if [ "${{ matrix.use_mtp }}" = "true" ]; then
          READY_TIMEOUT=180
        else
          READY_TIMEOUT=60
        fi

        echo "Checking binary dependencies..."
        if [ "$(uname)" = "Darwin" ]; then
          otool -L mlx-binaries/server | head -20
        else
          ldd mlx-binaries/server | grep "not found" && {
            echo "FAIL: missing shared libraries"
            exit 1
          }
          echo "All shared libraries resolved OK"
        fi

        echo "Starting server on port $PORT (MTP=${MTP_FLAG:+ON:-OFF})..."
        # PR #10 (MLX commit 45f6ee1) fixed affine_dequantize_packed_kernel #pragma unroll
        # miscompile on RDNA 3.5. Our local patch was removed — dequant+GEMM path now works
        # correctly for uint32 packed weights on ROCm.
        mlx-binaries/server --port $PORT $MTP_FLAG $NO_THINK_FLAG > server.log 2>&1 &
        SERVER_PID=$!

        # Tear the server down on any exit. Never `wait` on it: the server may
        # ignore SIGTERM, and an unbounded wait hangs the job until the runner's
        # job timeout fires (20-30 min), wedging the single self-hosted runner.
        stop_server() {
          [ -n "${SERVER_PID:-}" ] || return 0
          kill "$SERVER_PID" 2>/dev/null || true
          for _ in $(seq 1 10); do
            kill -0 "$SERVER_PID" 2>/dev/null || return 0
            sleep 1
          done
          kill -9 "$SERVER_PID" 2>/dev/null || true
        }
        trap stop_server EXIT

        # Poll for server readiness
        echo "Waiting for server to become ready (timeout: ${READY_TIMEOUT}s)..."
        READY=false
        for i in $(seq 1 $READY_TIMEOUT); do
          http_code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:$PORT/health 2>/dev/null || echo "000")
          if [ "$http_code" = "200" ]; then
            echo "Server ready after ${i}s (HTTP $http_code)"
            READY=true
            break
          fi
          sleep 1
        done

        if [ "$READY" != "true" ]; then
          echo "Server failed to start within ${READY_TIMEOUT}s. Last HTTP code: $http_code"
          echo "=== Server Log ==="
          cat server.log || true
          exit 1
        fi

        echo "Checking models endpoint..."
        models_response=$(curl -s http://127.0.0.1:$PORT/v1/models 2>&1)
        if echo "$models_response" | grep -q '"data"'; then
          echo "Models endpoint PASSED"
        else
          echo "Models endpoint FAILED: $models_response"
          stop_server
          exit 1
        fi

        # Best-effort model warm-up (discard result)
        echo "Sending warm-up request..."
        curl -s --max-time 120 -o /dev/null -X POST http://127.0.0.1:$PORT/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d "{
            \"model\": \"${{ matrix.model }}\",
            \"messages\": [{\"role\": \"user\", \"content\": \"hi\"}],
            \"max_tokens\": 5,
            \"temperature\": 0.0,
            \"stream\": false
          }" 2>/dev/null || echo "Warm-up request skipped (non-fatal)"

        # Inference test with retry logic (max 2 attempts)
        MAX_RETRIES=2
        ATTEMPT=0
        PASS=false

        while [ $ATTEMPT -lt $MAX_RETRIES ]; do
          ATTEMPT=$((ATTEMPT + 1))
          echo "=== Inference test attempt $ATTEMPT/$MAX_RETRIES ==="

          response=$(curl -s --max-time 180 -X POST http://127.0.0.1:$PORT/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"${{ matrix.model }}\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You are a math assistant. Answer arithmetic questions with a single number.\"},
                {\"role\": \"user\", \"content\": \"What is 2+2? Answer with just the number.\"}
              ],
              \"max_tokens\": 32,
              \"temperature\": 0.0,
              \"stream\": false
            }" 2>&1) || {
            echo "Attempt $ATTEMPT: chat completion request failed"
            continue
          }

          content=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'].strip())" 2>/dev/null) || content=""
          answer=$(echo "$content" | python3 -c "import sys,re;t=sys.stdin.read();t=re.sub(r'<think>.*?</think>','',t,flags=re.DOTALL);m=re.search(r'(?:answer is|answer:)\s*(\d+)',t,flags=re.IGNORECASE);print(m.group(1) if m else (re.search(r'=\s*(\d+)',t).group(1) if re.search(r'=\s*(\d+)',t) else (re.findall(r'(?<!\d)(\d+)(?!\d)',t)[0] if re.findall(r'(?<!\d)(\d+)(?!\d)',t) else '')))" 2>/dev/null) || answer=""
          echo "=== RAW MODEL OUTPUT (Attempt $ATTEMPT) ==="
          echo "$response" | python3 -m json.tool 2>/dev/null || echo "$response"
          echo "=== END RAW OUTPUT ==="
          echo "Attempt $ATTEMPT extracted answer: $answer"

          if [ "$answer" = "4" ]; then
            PASS=true
            break
          fi
          echo "Attempt $ATTEMPT: did not contain '4', retrying in 5s..."
          sleep 5
        done

        if [ "$PASS" = "true" ]; then
          echo "INFERENCE TEST PASSED -- model answered correctly on attempt $ATTEMPT"
        else
          echo "=== Server Response ==="
          echo "$response" | python3 -m json.tool 2>/dev/null || echo "$response"
          echo "=== End Response ==="
          echo "INFERENCE TEST FAILED -- expected answer '4' after $MAX_RETRIES attempts"
          echo "=== Server Log (last 50 lines) ==="
          tail -50 server.log 2>/dev/null || true
          stop_server
          exit 1
        fi

        echo "SMOKE TEST PASSED -- server started, health check, and inference OK"

        # --- Benchmark: extract TPS metrics as structured JSON ---
        echo "=== Performance Benchmarks ==="
        echo "${{ matrix.model }}:"

        # Parse [TPS] lines from server.log and build benchmark JSON
        python3 -c "
        import json, re, sys, os
        from datetime import datetime, timezone

        model = '${{ matrix.model }}'
        platform = '${{ matrix.os }}'
        ts = ''
        try:
            with open('server.log', 'r') as f:
                content = f.read()
        except FileNotFoundError:
            print('  (no server.log found)', file=sys.stderr)
            content = ''

        results = []
        # Split on [TPS] markers to get each generation block
        tps_blocks = re.split(r'(?=\[TPS\])', content)
        for block in tps_blocks:
            if '[TPS]' not in block:
                continue
            m = re.search(r'\[TPS\].*?Prompt:\s+(\d+)\s+tokens.*?([\d.]+)\s+tokens/s.*?([\d.e+-]+)s.*?Generation:\s+(\d+)\s+tokens.*?([\d.]+)\s+tokens/s.*?([\d.e+-]+)s', block, re.DOTALL)
            if m:
                prompt_tok = int(m.group(1))
                prompt_tps = float(m.group(2))
                prompt_time = float(m.group(3))
                gen_tok = int(m.group(4))
                gen_tps = float(m.group(5))
                gen_time = float(m.group(6))

                # Extract optional MTP metrics
                mtp_m = re.search(r'MTP:\s+drafts=(\d+)\s+accepted=(\d+)\s+speculative_steps=(\d+)\s+acceptance_rate=([\d.]+)%', block, re.DOTALL)
                mtp_enabled = mtp_m is not None
                entry = {
                    'model': model,
                    'platform': platform,
                    'prompt_tokens': prompt_tok,
                    'generation_tokens': gen_tok,
                    'prompt_tps': round(prompt_tps, 2),
                    'generation_tps': round(gen_tps, 2),
                    'prompt_time_s': round(prompt_time, 4),
                    'generation_time_s': round(gen_time, 4),
                    'mtp_enabled': mtp_enabled,
                    'timestamp': datetime.now(timezone.utc).isoformat()
                }
                if mtp_m:
                    entry['mtp_draft_tokens_proposed'] = int(mtp_m.group(1))
                    entry['mtp_draft_tokens_accepted'] = int(mtp_m.group(2))
                    entry['mtp_speculative_steps'] = int(mtp_m.group(3))
                    entry['mtp_acceptance_rate_pct'] = float(mtp_m.group(4))
                results.append(entry)

        if results:
            with open('benchmark-results-${{ matrix.os }}.json', 'w') as f:
                json.dump(results, f, indent=2)

            # Print formatted datatable
            print(f\"  {'Platform':<16} {'Prompt TPS':>12} {'Gen TPS':>10} {'Tokens':>8} {'MTP':>6}\")
            print(f\"  {'-'*14:<16} {'-'*10:>12} {'-'*8:>10} {'-'*6:>8} {'-'*4:>6}\")
            for r in results:
                mtp_status = 'YES' if r.get('mtp_enabled') else 'no'
                print(f\"  {r['platform']:<16} {r['prompt_tps']:>12.2f} {r['generation_tps']:>10.2f} {r['generation_tokens']:>8} {mtp_status:>6}\")
        else:
            # Write empty result so artifact still uploads
            with open('benchmark-results-${{ matrix.os }}.json', 'w') as f:
                json.dump([], f)
            print('  (no TPS data found in server log)')
        "
        echo "=== End Benchmarks ==="

        stop_server

    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: bench-results-${{ matrix.os }}
        path: benchmark-results-${{ matrix.os }}.json
        retention-days: 30

  collect-benchmarks:
    needs: [test-simple-math]
    if: always() && (needs.test-simple-math.result == 'success' || needs.test-simple-math.result == 'failure')
    runs-on: ubuntu-22.04
    steps:
    - name: Download all benchmark artifacts
      uses: actions/download-artifact@v6
      with:
        path: ./bench-data
        pattern: bench-results-*
        merge-multiple: true

    - name: Merge benchmarks and detect trends
      run: |
        set -e
        python3 -c "
        import json, glob, os, sys
        from pathlib import Path

        all_results = []
        for f in sorted(glob.glob('./bench-data/benchmark-results-*.json')):
            try:
                with open(f) as fh:
                    data = json.load(fh)
                    if isinstance(data, list):
                        all_results.extend(data)
            except Exception as e:
                print(f'Warning: could not read {f}: {e}', file=sys.stderr)

        if not all_results:
            print('No benchmark results collected', file=sys.stderr)
            with open('benchmarks-latest.json', 'w') as fh:
                json.dump({'results': [], 'trend_warnings': []}, fh, indent=2)
            sys.exit(0)

        # Group by model+platform for trend detection
        from collections import defaultdict
        grouped = defaultdict(list)
        for r in all_results:
            key = (r.get('model', ''), r.get('platform', ''))
            grouped[key].append(r['generation_tps'])

        # Rolling average (last 3 runs) and trend detection
        trend_warnings = []
        for (model, platform), tps_values in grouped.items():
            if len(tps_values) >= 2:
                # Current run vs rolling average of previous runs
                current = tps_values[-1]
                history = tps_values[:-1]
                # Keep last 3 for rolling average
                history = history[-3:]
                avg = sum(history) / len(history)
                if avg > 0:
                    deviation = abs(current - avg) / avg
                    if deviation > 0.15:
                        direction = 'DOWN' if current < avg else 'UP'
                        trend_warnings.append({
                            'model': model,
                            'platform': platform,
                            'current_tps': round(current, 2),
                            'rolling_avg_tps': round(avg, 2),
                            'deviation_pct': round(deviation * 100, 1),
                            'direction': direction
                        })
                        print(f'WARN: {model} on {platform} generation_tps deviated {deviation*100:.1f}% ({direction}) from {avg:.1f} rolling avg', file=sys.stderr)

        output = {
            'results': all_results,
            'trend_warnings': trend_warnings,
            'collected_at': __import__('datetime').datetime.now(__import__('datetime').timezone.utc).isoformat()
        }

        with open('benchmarks-latest.json', 'w') as fh:
            json.dump(output, fh, indent=2)

        # Print formatted datatable
        print()
        print(f\"  {'Platform':<16} {'Model':<40} {'Gen TPS':>10} {'Tokens':>8} {'MTP':>6} {'Trend':>8}\")
        print(f\"  {'-'*14:<16} {'-'*38:<40} {'-'*8:>10} {'-'*6:>8} {'-'*4:>6} {'-'*6:>8}\")
        for r in all_results:
            model_short = r.get('model', '')[-35:]
            mtp = 'YES' if r.get('mtp_enabled') else 'no'
            trend = ''
            for tw in trend_warnings:
                if tw['model'] == r.get('model') and tw['platform'] == r.get('platform'):
                    trend = f\"{tw['direction']} {tw['deviation_pct']}%\"
                    break
            print(f\"  {r['platform']:<16} {model_short:<40} {r['generation_tps']:>10.2f} {r['generation_tokens']:>8} {mtp:>6} {trend:>8}\")
        print()

        print(f'Collected {len(all_results)} benchmark results, {len(trend_warnings)} trend warnings')
        "

    - name: Upload merged benchmarks
      uses: actions/upload-artifact@v6
      with:
        name: benchmarks-latest
        path: benchmarks-latest.json
        retention-days: 90

  create-release:
    needs: [prepare-matrix, build-ubuntu-rocm, build-ubuntu-cpu, build-macos, test-simple-math]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    if: |
      always() &&
      (needs.build-ubuntu-rocm.result == 'success' || needs.build-ubuntu-cpu.result == 'success' || needs.build-macos.result == 'success') &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == null) ||
       github.event_name == 'schedule')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Download all build artifacts
      uses: actions/download-artifact@v6
      with:
        path: ./all-artifacts

    - name: Decide whether to cut a release
      id: should-release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        EVENT_NAME: ${{ github.event_name }}
        HEAD_SHA: ${{ github.sha }}
        REPO: ${{ github.repository }}
      run: |
        if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
          echo "workflow_dispatch: forcing release."
          echo "should_release=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        latest_tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
        if [ -z "$latest_tag" ]; then
          echo "No prior release found; cutting the first one."
          echo "should_release=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        ref=$(gh api "repos/${REPO}/git/refs/tags/${latest_tag}" 2>/dev/null || echo "")
        obj_type=$(echo "$ref" | jq -r '.object.type // empty')
        obj_sha=$(echo "$ref" | jq -r '.object.sha // empty')
        if [ "$obj_type" = "tag" ] && [ -n "$obj_sha" ]; then
          obj_sha=$(gh api "repos/${REPO}/git/tags/${obj_sha}" --jq '.object.sha' 2>/dev/null || echo "$obj_sha")
        fi

        echo "Latest release: ${latest_tag} → ${obj_sha:-unknown}"
        echo "Current HEAD:   ${HEAD_SHA}"
        if [ -n "$obj_sha" ] && [ "$obj_sha" = "$HEAD_SHA" ]; then
          echo "main is unchanged since ${latest_tag}; skipping release."
          echo "should_release=false" >> $GITHUB_OUTPUT
        else
          echo "main has new commits since ${latest_tag}; cutting a release."
          echo "should_release=true" >> $GITHUB_OUTPUT
        fi

    - name: Generate release tag
      id: generate-tag
      if: steps.should-release.outputs.should_release == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        existing_tags=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' \
          | grep -E "^b[0-9]{4}(-[a-z]+)?$" | sed 's/-.*$//' | sort -uV || echo "")

        if [ -z "$existing_tags" ]; then
          next_number=1000
          echo "No existing sequential release tags found, starting with b1000-stable"
        else
          highest_tag=$(echo "$existing_tags" | tail -n 1)
          highest_number=$(echo "$highest_tag" | sed 's/^b//')
          next_number=$((highest_number + 1))
          echo "Highest existing tag: $highest_tag (number: $highest_number)"
        fi

        TAG=$(printf "b%04d-stable" $next_number)
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Generated release tag: ${TAG}"

    - name: Check if tag already exists
      id: check-tag
      if: steps.should-release.outputs.should_release == 'true'
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"
        if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
          echo "Tag $TAG already exists, skipping release creation"
          echo "tag_exists=true" >> $GITHUB_OUTPUT
        else
          echo "tag_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Create archives
      if: steps.should-release.outputs.should_release == 'true' && steps.check-tag.outputs.tag_exists == 'false'
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"

        if [ -d "./all-artifacts/mlx-engine-ubuntu-rocm-x64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-ubuntu-rocm-x64.zip"
          (cd "./all-artifacts/mlx-engine-ubuntu-rocm-x64" && zip -9 -r "$GITHUB_WORKSPACE/mlx-engine-${TAG}-ubuntu-rocm-x64.zip" *)
        fi

        if [ -d "./all-artifacts/mlx-engine-ubuntu-cpu-x64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-ubuntu-cpu-x64.zip"
          (cd "./all-artifacts/mlx-engine-ubuntu-cpu-x64" && zip -9 -r "$GITHUB_WORKSPACE/mlx-engine-${TAG}-ubuntu-cpu-x64.zip" *)
        fi

        if [ -d "./all-artifacts/mlx-engine-macos-arm64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-macos-arm64.zip"
          (cd "./all-artifacts/mlx-engine-macos-arm64" && zip -9 -r "$GITHUB_WORKSPACE/mlx-engine-${TAG}-macos-arm64.zip" *)
        fi

        echo "Created archives:"
        ls -la *.zip 2>/dev/null || echo "No archives created"

    - name: Create Release
      if: steps.should-release.outputs.should_release == 'true' && steps.check-tag.outputs.tag_exists == 'false'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"

        upload_files=$(ls *.zip 2>/dev/null | tr '\n' ' ')

        if [ -z "$upload_files" ]; then
          echo "No archives to upload, skipping release"
          exit 0
        fi

        echo "Files to upload: $upload_files"

        gh release create "$TAG" \
          --title "$TAG" \
          --notes "**Build Number**: $TAG
        **Build Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

        MLX Engine binaries with ROCm ${{ env.ROCM_VERSION }}, CPU, and macOS support.
        **Requires system ROCm ${{ env.ROCM_VERSION }} installation** — ROCm libraries are not bundled.

        ### Downloads
        - **Ubuntu ROCm ${{ env.ROCM_VERSION }}**: mlx-engine-${TAG}-ubuntu-rocm-x64.zip
        - **Ubuntu CPU**: mlx-engine-${TAG}-ubuntu-cpu-x64.zip
        - **macOS ARM64**: mlx-engine-${TAG}-macos-arm64.zip" \
          $upload_files
