name: Build MLX Engine
on:
  workflow_dispatch:
    inputs:
      operating_systems:
        description: 'Operating systems to build for (comma-separated: ubuntu,macos)'
        required: false
        default: 'ubuntu,macos'
      create_release:
        description: 'Create a GitHub release after successful build'
        required: false
        default: true
        type: boolean

  pull_request:
    types: [opened, synchronize, reopened]

  schedule:
    - cron: '0 14 * * *'

env:
  OPERATING_SYSTEMS: ${{ github.event.inputs.operating_systems || 'ubuntu,macos' }}

jobs:
  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      should_build_ubuntu_rocm: ${{ steps.set-matrix.outputs.should_build_ubuntu_rocm }}
      should_build_ubuntu_cpu: ${{ steps.set-matrix.outputs.should_build_ubuntu_cpu }}
      should_build_macos: ${{ steps.set-matrix.outputs.should_build_macos }}
    steps:
    - name: Set matrix
      id: set-matrix
      run: |
        operating_systems="${{ env.OPERATING_SYSTEMS }}"
        echo "Input operating systems: $operating_systems"

        should_build_ubuntu_rocm="false"
        should_build_ubuntu_cpu="false"
        should_build_macos="false"

        if [[ "$operating_systems" == *"ubuntu"* ]]; then
          should_build_ubuntu_rocm="true"
          should_build_ubuntu_cpu="true"
        fi

        if [[ "$operating_systems" == *"macos"* ]]; then
          should_build_macos="true"
        fi

        echo "should_build_ubuntu_rocm=$should_build_ubuntu_rocm" >> $GITHUB_OUTPUT
        echo "should_build_ubuntu_cpu=$should_build_ubuntu_cpu" >> $GITHUB_OUTPUT
        echo "should_build_macos=$should_build_macos" >> $GITHUB_OUTPUT

        echo "Ubuntu ROCm build: $should_build_ubuntu_rocm"
        echo "Ubuntu CPU build: $should_build_ubuntu_cpu"
        echo "macOS build: $should_build_macos"

  build-ubuntu-rocm:
    name: build-ubuntu-rocm
    runs-on: ubuntu-22.04
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_ubuntu_rocm == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build \
          libcurl4-openssl-dev libopenblas-dev liblapacke-dev pkg-config

    - name: Install ROCm 7.13.0
      run: |
        # AMD official ROCm 7.13.0 (new apt repo layout)
        sudo mkdir --parents --mode=0755 /etc/apt/keyrings
        wget -q https://repo.amd.com/rocm/packages/gpg/rocm.gpg -O - | \
          gpg --dearmor | sudo tee /etc/apt/keyrings/amdrocm.gpg > /dev/null

        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/amdrocm.gpg] https://repo.amd.com/rocm/packages/ubuntu2204 stable main" \
          | sudo tee /etc/apt/sources.list.d/rocm.list

        sudo apt-get update
        sudo apt-get install -y -o Dpkg::Options::="--force-overwrite" \
          amdrocm7.13 \
          amdrocm-core-dev7.13

        echo "Installed ROCm 7.13.0 (runtime + development) from AMD apt."

    - name: Set ROCm environment variables
      run: |
        echo "HIP_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "ROCM_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "HIP_PLATFORM=amd" >> $GITHUB_ENV
        echo "/opt/rocm/bin:/opt/rocm/llvm/bin:/opt/rocm/lib/llvm/bin:$PATH" >> $GITHUB_PATH

    - name: Cache FetchContent MLX source
      uses: actions/cache@v4
      with:
        path: |
          build/_deps/mlx-src
          build/_deps/mlx-subbuild
        key: mlx-src-linux-${{ hashFiles('CMakeLists.txt') }}

    - name: Build MLX Engine + ROCm
      run: |
        export HIP_PATH=/opt/rocm
        export ROCM_PATH=/opt/rocm
        export PATH="/opt/rocm/bin:/opt/rocm/llvm/bin:/opt/rocm/lib/llvm/bin:$PATH"

        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_HIP_COMPILER=hipcc \
          -DCMAKE_PREFIX_PATH=/opt/rocm \
          -DCMAKE_HIP_ARCHITECTURES="gfx1100;gfx1101;gfx1102;gfx1103;gfx1150;gfx1151;gfx1200;gfx1201" \
          -DCMAKE_CXX_CLANG_TIDY= \
          -DCLANG_TIDY_EXE=CLANG_TIDY_EXE-NOTFOUND \
          -DMINJA_EXAMPLE_ENABLED=OFF \
          -DMLX_BUILD_ROCM=ON \
          -DMLX_LM_BUILD_TESTS=OFF \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(nproc)

    - name: Package build artifacts
      run: |
        mkdir -p output

        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        for lib in libopenblas.so* liblapacke.so* libgfortran.so*; do
          cp /usr/lib/x86_64-linux-gnu/$lib output/ 2>/dev/null || true
        done

        echo "Packaged artifacts:"
        ls -lh output/

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-ubuntu-rocm-x64
        path: output/
        retention-days: 30

  build-ubuntu-cpu:
    runs-on: ubuntu-22.04
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_ubuntu_cpu == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build \
          libcurl4-openssl-dev libopenblas-dev liblapacke-dev pkg-config

    - name: Cache FetchContent MLX source
      uses: actions/cache@v4
      with:
        path: |
          build/_deps/mlx-src
          build/_deps/mlx-subbuild
        key: mlx-src-linux-${{ hashFiles('CMakeLists.txt') }}

    - name: Build MLX Engine (CPU only)
      run: |
        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_CLANG_TIDY= \
          -DCLANG_TIDY_EXE=CLANG_TIDY_EXE-NOTFOUND \
          -DMINJA_EXAMPLE_ENABLED=OFF \
          -DMLX_BUILD_ROCM=OFF \
          -DMLX_LM_BUILD_TESTS=ON \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(nproc)

    - name: Run unit tests (CPU-safe only)
      run: |
        cd build
        ctest --test-dir tests -R "test_types|test_config|test_generate|test_kv_cache|test_chat_template|test_rope_utils" \
          --output-on-failure --timeout 120

    - name: Package build artifacts
      run: |
        mkdir -p output
        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        for lib in libopenblas.so* liblapacke.so* libgfortran.so*; do
          cp /usr/lib/x86_64-linux-gnu/$lib output/ 2>/dev/null || true
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-ubuntu-cpu-x64
        path: output/
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.should_build_macos == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        brew install cmake ninja curl

    - name: Cache FetchContent MLX source
      uses: actions/cache@v4
      with:
        path: |
          build/_deps/mlx-src
          build/_deps/mlx-subbuild
        key: mlx-src-macos-${{ hashFiles('CMakeLists.txt') }}

    - name: Build MLX Engine (macOS)
      run: |
        mkdir -p build && cd build

        cmake .. -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_CLANG_TIDY= \
          -DCLANG_TIDY_EXE=CLANG_TIDY_EXE-NOTFOUND \
          -DMINJA_EXAMPLE_ENABLED=OFF \
          -DMLX_LM_BUILD_TESTS=ON \
          -DMLX_LM_BUILD_EXAMPLES=ON

        cmake --build . -j $(sysctl -n hw.ncpu)

    - name: Run unit tests
      run: |
        cd build
        ctest --test-dir tests -R "test_types|test_config|test_generate|test_kv_cache|test_chat_template|test_rope_utils" \
          --output-on-failure --timeout 120

    - name: Package build artifacts
      run: |
        mkdir -p output
        cp build/server output/
        cp build/chat output/
        cp build/diagnose output/ 2>/dev/null || true

        # Package MLX Metal shader library (required at runtime on macOS)
        METALLIB=$(find build -name "mlx.metallib" 2>/dev/null | head -1)
        if [ -n "$METALLIB" ]; then
          echo "Found metalllib: $METALLIB"
          cp "$METALLIB" output/
        else
          echo "WARNING: mlx.metallib not found in build tree"
          find build -name "*.metallib" 2>/dev/null || true
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mlx-engine-macos-arm64
        path: output/
        retention-days: 30

  # ---------------------------------------------------------------------------
  # Lightweight smoke test: start server, load model, generate output
  # ---------------------------------------------------------------------------
  test-simple-math:
    name: test-simple-math-${{ matrix.os }}
    needs: [build-ubuntu-rocm, build-ubuntu-cpu, build-macos]
    if: |
      always() &&
      (needs.build-ubuntu-rocm.result == 'success' ||
       needs.build-ubuntu-cpu.result == 'success' ||
       needs.build-macos.result == 'success')
    runs-on: ${{ fromJson(matrix.runs_on) }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-rocm
            artifact: mlx-engine-ubuntu-rocm-x64
            runs_on: '["ubuntu-rocm-gfx1151-gll", "gfx1151", "Linux", "X64"]'
            install_rocm: false
          - os: ubuntu-cpu
            artifact: mlx-engine-ubuntu-cpu-x64
            runs_on: '["ubuntu-22.04"]'
            install_rocm: false
          - os: macos-arm64
            artifact: mlx-engine-macos-arm64
            runs_on: '["macos-latest"]'
            install_rocm: false
    steps:
    - name: ROCm runtime setup (Ubuntu ROCm only)
      if: matrix.os == 'ubuntu-rocm'
      run: |
        echo "=== ROCm Runtime Setup ==="

        # Verify-then-install: check if ROCm 7.13 is already installed
        ROCM_INSTALLED="false"
        if dpkg -s amdrocm7.13 2>/dev/null | grep -q "Status: install ok installed"; then
          echo "ROCm 7.13 package already installed"
          ROCM_INSTALLED="true"
        fi

        if [ -e /dev/kfd ]; then
          echo "/dev/kfd: FOUND"
        else
          echo "/dev/kfd: NOT FOUND (will check again after ROCm install)"
        fi

        if [ "${ROCM_INSTALLED}" = "false" ]; then
          echo "Installing ROCm 7.13.0 runtime from AMD apt repository..."

          sudo mkdir --parents --mode=0755 /etc/apt/keyrings
          wget -q https://repo.amd.com/rocm/packages/gpg/rocm.gpg -O - | \
            gpg --dearmor | sudo tee /etc/apt/keyrings/amdrocm.gpg > /dev/null

          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/amdrocm.gpg] https://repo.amd.com/rocm/packages/ubuntu2204 stable main" \
            | sudo tee /etc/apt/sources.list.d/rocm.list

          sudo apt-get update
          sudo apt-get install -y -o Dpkg::Options::="--force-overwrite" amdrocm7.13

          echo "/opt/rocm/lib" | sudo tee /etc/ld.so.conf.d/rocm.conf
          sudo ldconfig

          # Attempt to load kernel modules for GPU detection
          sudo modprobe amdgpu 2>/dev/null || true
          sudo modprobe amdkfd 2>/dev/null || true
          sleep 2

          echo "ROCm 7.13.0 runtime installation complete"
        fi

        # Post-install GPU verification
        echo "=== Post-Install GPU Verification ==="
        if [ -e /dev/kfd ]; then
          echo "/dev/kfd: FOUND"
        else
          echo "::warning::/dev/kfd missing after ROCm install. GPU hardware may not be present or kernel modules not loaded."
        fi

        if command -v /opt/rocm/bin/rocm-smi &>/dev/null; then
          echo "rocm-smi output:"
          /opt/rocm/bin/rocm-smi 2>&1 || echo "  rocm-smi returned non-zero"
        else
          echo "rocm-smi: not found at /opt/rocm/bin/rocm-smi"
        fi


    - name: Download build artifact
      uses: actions/download-artifact@v6
      with:
        name: ${{ matrix.artifact }}
        path: mlx-binaries

    - name: Pre-cache model
      run: |
        if [ "$(uname)" = "Darwin" ]; then
          pip3 install --break-system-packages huggingface-hub
        else
          pip3 install huggingface-hub
        fi
        echo "Downloading mlx-community/Qwen3-0.6B-4bit to HF cache..."
        python3 -c "
        from huggingface_hub import snapshot_download
        snapshot_download(
            repo_id='mlx-community/Qwen3-0.6B-4bit',
            allow_patterns=['*.json', '*.safetensors'],
        )
        print('Model cached successfully')
        "

    - name: Make binaries executable
      run: chmod +x mlx-binaries/server

    - name: Set library path
      run: |
        if [ "$(uname)" = "Darwin" ]; then
          echo "DYLD_LIBRARY_PATH=$PWD/mlx-binaries" >> $GITHUB_ENV
        elif [ -d /opt/rocm/lib ]; then
          echo "LD_LIBRARY_PATH=$PWD/mlx-binaries:/opt/rocm/lib" >> $GITHUB_ENV
        else
          echo "LD_LIBRARY_PATH=$PWD/mlx-binaries" >> $GITHUB_ENV
        fi

    - name: Check ROCm GPU availability (Ubuntu ROCm only)
      if: matrix.os == 'ubuntu-rocm'
      id: gpu-check
      run: |
        echo "=== ROCm GPU Check ==="
        echo "Checking /dev/kfd (compute driver)..."
        if [ -e /dev/kfd ]; then
          echo "  /dev/kfd: FOUND ($(ls -l /dev/kfd))"
        else
          echo "  /dev/kfd: NOT FOUND"
        fi
        echo "Checking /dev/dri/renderD* (render nodes)..."
        ls -la /dev/dri/renderD* 2>/dev/null || echo "  No render nodes found"
        if command -v rocm-smi &>/dev/null; then
          echo "rocm-smi output:"
          rocm-smi 2>&1 || echo "  rocm-smi failed"
        else
          echo "rocm-smi: not found on PATH"
        fi
        echo "LD_LIBRARY_PATH: ${LD_LIBRARY_PATH:-<not set>}"
        if [ -e /dev/kfd ]; then
          echo "GPU_AVAILABLE=true"
          echo "gpu_available=true" >> $GITHUB_OUTPUT
        else
          echo "::warning::No ROCm GPU detected on this runner. GPU device nodes missing."
          echo "gpu_available=false" >> $GITHUB_OUTPUT
        fi

    - name: 'Smoke test: server start and health'
      run: |
        set -e

        PORT=18999

        # Verify binary can load all shared libraries
        echo "Checking binary dependencies..."
        if [ "$(uname)" = "Darwin" ]; then
          otool -L mlx-binaries/server | head -20
        else
          ldd mlx-binaries/server | grep "not found" && {
            echo "FAIL: missing shared libraries"
            exit 1
          }
          echo "All shared libraries resolved OK"
        fi

        # Start server
        echo "Starting server on port $PORT ..."
        mlx-binaries/server --port $PORT &
        SERVER_PID=$!
        sleep 3

        # Verify server is alive
        echo "Checking health endpoint..."
        http_code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:$PORT/health || echo "000")
        if [ "$http_code" = "200" ]; then
          echo "Health check PASSED (HTTP $http_code)"
        else
          echo "Health check FAILED (HTTP $http_code)"
          exit 1
        fi

        # Verify /v1/models endpoint responds
        echo "Checking models endpoint..."
        models_response=$(curl -s http://127.0.0.1:$PORT/v1/models 2>&1)
        if echo "$models_response" | grep -q '"data"'; then
          echo "Models endpoint PASSED"
        else
          echo "Models endpoint FAILED: $models_response"
          exit 1
        fi

        # Inference test: skip on ROCm if no GPU available
        if [ "${{ matrix.os }}" = "ubuntu-rocm" ]; then
          gpu_avail="${{ steps.gpu-check.outputs.gpu_available }}"
          if [ "${gpu_avail}" != "true" ]; then
            echo "SKIPPING inference test on ROCm (no GPU detected: gpu_available=${gpu_avail})"
            echo "See 'Check ROCm GPU availability' step above for diagnostics"
            echo "SMOKE TEST PASSED -- server started, health check, and models endpoint OK (inference skipped: no ROCm GPU)"
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
            exit 0
          fi
          echo "ROCm GPU detected, proceeding with inference test"
        fi

        echo "Running inference test with Qwen3-0.6B-4bit ..."
        response=$(curl -s --max-time 1200 -X POST http://127.0.0.1:$PORT/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d "{
            \"model\": \"mlx-community/Qwen3-0.6B-4bit\",
            \"messages\": [{\"role\": \"user\", \"content\": \"What is 2+2? Answer with just the number.\"}],
            \"max_tokens\": 128,
            \"temperature\": 0.0,
            \"stream\": false
          }" 2>&1) || {
          echo "FAIL: chat completion request failed"
          echo "Response: $response"
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit 1
        }

        echo "=== Server Response ==="
        echo "$response" | python3 -m json.tool 2>/dev/null || echo "$response"
        echo "=== End Response ==="

        content=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'].strip())" 2>/dev/null) || content=""
        echo "Extracted content: $content"

        if echo "$content" | grep -q "4"; then
          echo "INFERECE TEST PASSED -- model answered correctly"
        else
          echo "INFERECE TEST FAILED -- expected '4' in response"
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit 1
        fi

        echo "SMOKE TEST PASSED -- server started, health check, and inference OK"

        kill $SERVER_PID 2>/dev/null || true
        wait $SERVER_PID 2>/dev/null || true

  create-release:
    needs: [prepare-matrix, build-ubuntu-rocm, build-ubuntu-cpu, build-macos, test-simple-math]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    if: |
      always() &&
      (needs.build-ubuntu-rocm.result == 'success' || needs.build-ubuntu-cpu.result == 'success' || needs.build-macos.result == 'success') &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == null) ||
       github.event_name == 'schedule')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Download all build artifacts
      uses: actions/download-artifact@v6
      with:
        path: ./all-artifacts

    - name: Generate release tag
      id: generate-tag
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        existing_tags=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' \
          | grep -E "^b[0-9]{4}(-[a-z]+)?$" | sed 's/-.*$//' | sort -uV || echo "")

        if [ -z "$existing_tags" ]; then
          next_number=1000
          echo "No existing sequential release tags found, starting with b1000"
        else
          highest_tag=$(echo "$existing_tags" | tail -n 1)
          highest_number=$(echo "$highest_tag" | sed 's/^b//')
          next_number=$((highest_number + 1))
          echo "Highest existing tag: $highest_tag (number: $highest_number)"
        fi

        TAG=$(printf "b%04d" $next_number)
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Generated release tag: ${TAG}"

    - name: Check if tag already exists
      id: check-tag
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"
        if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
          echo "Tag $TAG already exists, skipping release creation"
          echo "tag_exists=true" >> $GITHUB_OUTPUT
        else
          echo "tag_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Create archives
      if: steps.check-tag.outputs.tag_exists == 'false'
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"

        if [ -d "./all-artifacts/mlx-engine-ubuntu-rocm-x64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-ubuntu-rocm-x64.zip"
          cd "./all-artifacts/mlx-engine-ubuntu-rocm-x64"
          zip -9 -r "../../../mlx-engine-${TAG}-ubuntu-rocm-x64.zip" *
          cd ../../../
        fi

        if [ -d "./all-artifacts/mlx-engine-ubuntu-cpu-x64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-ubuntu-cpu-x64.zip"
          cd "./all-artifacts/mlx-engine-ubuntu-cpu-x64"
          zip -9 -r "../../../mlx-engine-${TAG}-ubuntu-cpu-x64.zip" *
          cd ../../../
        fi

        if [ -d "./all-artifacts/mlx-engine-macos-arm64" ]; then
          echo "Creating archive: mlx-engine-${TAG}-macos-arm64.zip"
          cd "./all-artifacts/mlx-engine-macos-arm64"
          zip -9 -r "../../../mlx-engine-${TAG}-macos-arm64.zip" *
          cd ../../../
        fi

        echo "Created archives:"
        ls -la *.zip 2>/dev/null || echo "No archives created"

    - name: Create Release
      if: steps.check-tag.outputs.tag_exists == 'false'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"

        upload_files=$(ls *.zip 2>/dev/null | tr '\n' ' ')

        if [ -z "$upload_files" ]; then
          echo "No archives to upload, skipping release"
          exit 0
        fi

        echo "Files to upload: $upload_files"

        gh release create "$TAG" \
          --title "$TAG" \
          --notes "**Build Number**: $TAG
        **Build Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

        MLX Engine binaries with ROCm 7.13.0, CPU, and macOS support.
        **Requires system ROCm 7.13.0 installation** — ROCm libraries are not bundled.

        ### Downloads
        - **Ubuntu ROCm 7.13.0**: mlx-engine-${TAG}-ubuntu-rocm-x64.zip
        - **Ubuntu CPU**: mlx-engine-${TAG}-ubuntu-cpu-x64.zip
        - **macOS ARM64**: mlx-engine-${TAG}-macos-arm64.zip" \
          $upload_files
